<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart | Alshafi Herbal Products</title>
<meta name="description" content="Review your Alshafi Herbal Products cart before checkout.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://alshafi-herbal-products.pages.dev/cart.html">
<meta name="theme-color" content="#0A0D0A">
<meta name="author" content="Alshafi Herbal Products">
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<div id="loading-screen"><div class="loader-leaf" aria-hidden="true"></div><span>Alshafi Herbal</span></div>

<main id="main">
  <section class="page-hero section-tight">
    <div class="container">
      <h1>Your Shopping Cart</h1>
      <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Cart</span></div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="checkout-grid">
        <div id="cartPageItems"></div>
        <div class="glass" style="padding:var(--sp-6); align-self:start;">
          <h3 class="mb-4">Order Summary</h3>
          <div class="coupon-row">
            <input type="text" id="couponInput" placeholder="Coupon code (e.g. WELCOME10)">
            <button class="btn btn-outline btn-sm" id="applyCouponBtn">Apply</button>
          </div>
          <div id="couponMessage"></div>
          <div class="order-summary-line"><span>Subtotal</span><span id="summarySubtotal">Rs. 0</span></div>
          <div class="order-summary-line"><span>Discount</span><span id="summaryDiscount">Rs. 0</span></div>
          <div class="order-summary-line"><span>Shipping</span><span id="summaryShipping">Calculated at checkout</span></div>
          <div class="order-summary-line total"><span>Total</span><span id="summaryTotal">Rs. 0</span></div>
          <a href="checkout.html" class="btn btn-gold btn-block mt-4" id="checkoutBtn">Proceed to Checkout</a>
          <a href="shop.html" class="btn btn-outline btn-block mt-2">Continue Shopping</a>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/icons.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
<script src="js/cart-page.js"></script>
</body>
</html>
