<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop All Herbal Products | Alshafi Herbal Products</title>
<meta name="description" content="Browse Alshafi's full range of herbal products — Majoon, Kushta, herbal oils, capsules, powders and syrups. Nationwide Cash on Delivery available.">
<link rel="canonical" href="https://www.alshafiherbal.com/shop.html">
<meta property="og:title" content="Shop All Herbal Products | Alshafi Herbal Products">
<meta property="og:description" content="Browse Majoon, Kushta, herbal oils, capsules, powders and syrups.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
<script type="application/ld+json">
{ "@context": "https://schema.org", "@type": "BreadcrumbList", "itemListElement": [
 {"@type":"ListItem","position":1,"name":"Home","item":"https://www.alshafiherbal.com/"},
 {"@type":"ListItem","position":2,"name":"Shop","item":"https://www.alshafiherbal.com/shop.html"}
]}
</script>
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<div id="loading-screen"><div class="loader-leaf" aria-hidden="true"></div><span>Alshafi Herbal</span></div>

<main id="main">
  <section class="page-hero section-tight">
    <div class="container">
      <h1>Shop Herbal Products</h1>
      <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Shop</span></div>
    </div>
  </section>

  <section class="section-tight">
    <div class="container">
      <div class="shop-toolbar glass">
        <div class="chip-filters" id="chipFilters">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="bestseller">Best Sellers</button>
          <button class="chip" data-filter="new">New Arrivals</button>
          <button class="chip" data-filter="sale">On Sale</button>
        </div>
        <div style="display:flex; gap:1rem; align-items:center;">
          <label for="sortSelect" class="visually-hidden">Sort products</label>
          <select id="sortSelect">
            <option value="default">Sort: Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Highest Rated</option>
          </select>
          <span id="resultCount" style="font-size:var(--fs-sm); color:var(--text-muted);"></span>
        </div>
      </div>

      <div class="shop-layout">
        <aside class="shop-sidebar glass">
          <div class="filter-block">
            <h5>Search</h5>
            <input type="search" id="shopSearch" placeholder="Search products…" aria-label="Search products">
          </div>
          <div class="filter-block">
            <h5>Categories</h5>
            <div id="categoryFilterList"></div>
          </div>
          <div class="filter-block">
            <h5>Max Price: <span id="priceLabel">Rs. 5000</span></h5>
            <input type="range" min="500" max="5000" step="100" value="5000" class="price-range" id="priceRange">
          </div>
        </aside>

        <div>
          <div class="products-grid" id="shopGrid"></div>
          <div id="noResults" style="display:none; text-align:center; padding:4rem 0; color:var(--text-muted);">
            <h3>No products found</h3>
            <p>Try adjusting your filters or search terms.</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/icons.js"></script>
<script src="js/ui.js"></script>
<script src="js/product-card.js"></script>
<script src="js/main.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
