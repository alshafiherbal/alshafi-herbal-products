<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop by Category | Alshafi Herbal Products</title>
<meta name="description" content="Explore Alshafi Herbal Products by category — Majoon, Kushta, herbal oils, capsules, powders and syrups.">
<link rel="canonical" href="https://www.alshafiherbal.com/categories.html">
<meta property="og:title" content="Shop by Category | Alshafi Herbal Products">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<div id="loading-screen"><div class="loader-leaf" aria-hidden="true"></div><span>Alshafi Herbal</span></div>

<main id="main">
  <section class="page-hero section-tight">
    <div class="container">
      <h1>Shop by Category</h1>
      <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Categories</span></div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="category-grid" id="allCategoriesGrid" style="grid-template-columns:repeat(3,1fr);"></div>
    </div>
  </section>
</main>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/icons.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const cats = await AlshafiData.getCategories();
  document.getElementById("allCategoriesGrid").innerHTML = cats.map(c => `
    <a href="shop.html?cat=${c.slug}" class="category-tile reveal">
      <img class="lazy-img" src="${c.image}" alt="${c.label} herbal products" loading="lazy" width="500" height="375">
      <div class="category-tile-content">
        <h3>${c.label}</h3>
        <p style="color:var(--text-secondary); font-size:var(--fs-sm); margin:0.4rem 0;">${c.desc}</p>
        <span>Shop Now →</span>
      </div>
    </a>
  `).join("");
  document.dispatchEvent(new CustomEvent("alshafi:content-rendered"));
});
</script>
</body>
</html>
